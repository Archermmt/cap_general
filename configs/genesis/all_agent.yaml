type: genesis_scene
backend: cpu
show_viewer: true
sim_options:
  dt: 0.01
  substeps: 2
rigid_options:
  dt: 0.01
  constraint_solver: Newton
  enable_collision: true
  enable_joint_limit: true
vis_options:
  rendered_envs_idx:
  - 0
  env_separate_rigid: true
viewer_options:
  res:
  - 1280
  - 960
  camera_pos:
  - 2.5
  - -1.0
  - 2.5
  camera_lookat:
  - 0.5
  - -0.3
  - 0.1
  camera_fov: 55
  max_FPS: 50
profiling_options:
  show_FPS: false
record_dir: ./outputs/genesis/all
agents:
- name: grasp
  config:
    type: grasp_agent
    max_retry: 5
    reset_mode: never
    record_execute: true
    stage: rl
    horizon: 1000
    rl_policy: runner
    bc_policy: bc
    run_demo_after_episode: true
    robot:
      type: genesis_grasp_robot
      video_fmt: mp4
      image_keys:
      - hand_camera_image
      seed: 7
      reset_time: 0
      example_root: /Users/tongmeng/Desktop/codes/genesis-world/examples/manipulation
      log_dir: /Users/tongmeng/Desktop/codes/genesis-world/examples/manipulation/logs/grasp_rl
      stage: rl
      num_envs: 1
      box_fixed: false
      visualize_camera: true
      max_episode_steps: 1000000
    policies:
      runner:
        type: rsl_rl
        log_dir: /Users/tongmeng/Desktop/codes/genesis-world/examples/manipulation/logs/grasp_rl
        train_cfg_index: 3
      bc:
        type: genesis_behavior_cloning
        example_root: /Users/tongmeng/Desktop/codes/genesis-world/examples/manipulation
        log_dir: /Users/tongmeng/Desktop/codes/genesis-world/examples/manipulation/logs/grasp_bc
        bc_cfg_index: 4
- name: go
  config:
    type: go2_agent
    max_retry: 5
    reset_mode: never
    record_execute: true
    policy: runner
    horizon: 1000
    robot:
      type: genesis_go2_robot
      video_fmt: mp4
      seed: 7
      reset_time: 0
      example_root: /Users/tongmeng/Desktop/codes/genesis-world/examples/locomotion
      log_dir: /Users/tongmeng/Desktop/codes/genesis-world/examples/locomotion/logs/go2-walking
      num_envs: 1
      image_keys:
      - body_camera_image
      camera_enabled: true
      camera_res:
      - 320
      - 240
      camera_fov: 70.0
      camera_pos:
      - -0.35
      - 0.0
      - 0.3
      camera_lookat:
      - 0.45
      - 0.0
      - 0.16
      camera_near: 0.05
      camera_far: 20.0
      turn_action_scale: 0.35
      max_episode_steps: 1000000
    policies:
      runner:
        type: rsl_rl
        log_dir: /Users/tongmeng/Desktop/codes/genesis-world/examples/locomotion/logs/go2-walking
        ckpt: 100
        train_cfg_index: 4
- name: drone
  config:
    type: drone_agent
    max_retry: 5
    reset_mode: never
    record_execute: true
    policy: runner
    horizon: 1000
    robot:
      type: genesis_drone_hover_robot
      video_fmt: mp4
      seed: 7
      reset_time: 0
      example_root: /Users/tongmeng/Desktop/codes/genesis-world/examples/drone
      log_dir: /Users/tongmeng/Desktop/codes/genesis-world/examples/drone/logs/drone-hovering
      num_envs: 1
      visualize_target: true
      visualize_camera: false
      camera_enabled: true
      camera_res:
      - 320
      - 240
      camera_fov: 90.0
      camera_pos:
      - 0.12
      - 0.0
      - -0.03
      camera_lookat:
      - 1.0
      - 0.0
      - -0.03
      camera_up:
      - 0.0
      - 0.0
      - 1.0
      camera_near: 0.02
      camera_far: 20.0
      max_visualize_fps: 60
      max_episode_steps: null
      auto_reset: false
    policies:
      runner:
        type: rsl_rl
        log_dir: /Users/tongmeng/Desktop/codes/genesis-world/examples/drone/logs/drone-hovering
        ckpt: 100
        train_cfg_index: 4
server:
  cap_id: cap
  host: 127.0.0.1
  port: 8903
  skill_folder: /Users/tongmeng/Desktop/codes/nanobot/nanobot/skills
