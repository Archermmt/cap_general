type: franka_agent
record_dir: ./outputs/genesis/franka
max_retry: 5
reset_mode: never
record_execute: true
horizon: 100
env:
  type: genesis_franka
  monitor:
    enable: true
    name: genesis_franka_scene
    config:
      type: genesis_scene
      backend: cpu
      scene:
        show_viewer: false
        viewer_options:
          camera_pos:
            - 2.0
            - -2.0
            - 2.0
          camera_lookat:
            - 0.0
            - 0.0
            - 0.5
          res:
            - 1280
            - 960
          max_FPS: 60
        sim_options:
          dt: 0.01
  seed: 7
  reset_time: 0
  video_fmt: mp4
policies: {}
server:
  agent_name: 七仔
  agent_id: cap
  host: 127.0.0.1
  port: 8905
  skill_folder: skills
