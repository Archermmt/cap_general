          enable_inst_interactivity: true
        graspnet:
          type: graspnet
          vendor_root: /home/genie_store/nfs_datas/tm/codes/cap-x/capx/third_party/contact_graspnet_pytorch
          device: cuda
        pyroki:
          type: pyroki
          robot_urdf_name: panda_description
          target_link_name: panda_hand
