    alias:
      - cap
      - 七仔
    config:
      type: robosuite
      max_retry: 5
      reset_mode: never
      record_execute: true
      robot:
        type: robosuite_robot
        controller_cfg: /home/genie_store/nfs_datas/tm/codes/cap_general/cap_general/frameworks/robosuite/controllers/panda_joint_ctrl.json
